<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Content-Security-Policy" content="default-src 'none'; style-src 'self'; script-src 'self'; img-src 'self' data:;" />
  <title>SelectAsk</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div id="shell">
    <header id="titlebar">
      <div class="brand" title="SelectAsk">
        <svg class="logo" viewBox="0 0 64 64" aria-hidden="true">
          <rect x="8" y="24" width="34" height="16" rx="8" />
          <rect class="caret" x="46" y="16" width="5" height="32" rx="2.5" />
        </svg>
      </div>
      <div class="titlebar-actions">
        <button id="btn-settings" class="icon-btn" title="Settings" aria-label="Settings">⚙</button>
        <button id="btn-close" class="icon-btn" title="Close (Esc)" aria-label="Close">✕</button>
      </div>
    </header>

    <!-- ASK VIEW -->
    <main id="view-ask">
      <div id="thread" aria-live="polite"></div>
      <form id="ask-form">
        <input id="question" type="text" placeholder="Ask about your selection…" autocomplete="off" />
        <button id="btn-send" type="submit" title="Send" aria-label="Send">↑</button>
        <button id="btn-stop" type="button" title="Stop generating" aria-label="Stop" hidden>■</button>
      </form>
    </main>

    <!-- SETTINGS VIEW -->
    <main id="view-settings" hidden>
      <h2>Settings</h2>
      <label class="field">
        <span>Provider</span>
        <select id="cfg-provider">
          <option value="anthropic">Anthropic (Claude)</option>
          <option value="openai">OpenAI</option>
          <option value="google">Google (Gemini)</option>
          <option value="compatible">OpenAI-compatible (Ollama, Groq, OpenRouter…)</option>
        </select>
      </label>
      <label class="field">
        <span>API key <em id="key-hint">stored only on this device</em></span>
        <input id="cfg-key" type="password" placeholder="sk-…" autocomplete="off" />
      </label>
      <label class="field">
        <span>Model</span>
        <input id="cfg-model" type="text" placeholder="claude-sonnet-5" autocomplete="off" />
      </label>
      <label class="field" id="field-baseurl" hidden>
        <span>Base URL</span>
        <input id="cfg-baseurl" type="text" placeholder="http://localhost:11434/v1" autocomplete="off" />
      </label>
      <fieldset class="field">
        <span>Triggers</span>
        <label class="check"><input id="cfg-tapctrl" type="checkbox" /> Select text, then tap <kbd>Ctrl</kbd></label>
        <label class="check"><input id="cfg-ctrlselect" type="checkbox" /> Hold <kbd>Ctrl</kbd> while selecting with the mouse</label>
        <label class="check"><input id="cfg-closeblur" type="checkbox" /> Close popup when it loses focus</label>
      </fieldset>
      <div class="settings-actions">
        <button id="btn-save" class="primary">Save</button>
        <button id="btn-back">Back</button>
      </div>
      <p class="settings-note">Open source — <a href="https://github.com/MoustafaTech/selectask" id="link-repo">github.com/MoustafaTech/selectask</a></p>
    </main>
  </div>
  <script src="dev-stub.js"></script>
  <script src="popup.js"></script>
</body>
</html>
